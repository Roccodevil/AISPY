<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-SPY | Truth Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="scanner-body">

    <div class="scanner-card text-center">
        <div class="logo">AI<span class="accent">-SPY</span></div>
        <p class="text-muted mb-4 fs-5">Decode Deception. Verify Truth.</p>

        <label for="fileInput" class="upload-area" id="dropZone">
            <h4 id="fileLabel" class="mb-0 fw-semibold">📁 Click to Upload Media</h4>
            <p class="text-muted small mt-2 mb-0">Supports Images & Videos</p>
        </label>
        <input type="file" id="fileInput" class="hidden" accept="image/*,video/*" onchange="handleFileSelect()">

        <div style="margin-bottom: 15px; text-align: left;">
            <label for="textClaim" class="text-muted small fw-bold">Verify a text claim or news (Optional):</label>
            <textarea id="textClaim" class="form-control border-0 shadow-sm" rows="3" placeholder="Enter a quote, news headline, or claim to fact-check..."></textarea>
        </div>

        <div class="input-group mb-3 shadow-sm">
            <input type="text" id="textInput" class="form-control form-control-lg border-0" placeholder="Or paste a media URL (YouTube, Insta)...">
            <button class="btn btn-primary btn-lg px-4 fw-bold" onclick="startScan()">SCAN NOW</button>
        </div>
        <div id="loader" class="hidden my-4">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted fw-bold animate-pulse">Running Neural Forensics...</p>
        </div>

        <div id="resultBox"></div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
