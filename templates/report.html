<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI-SPY | XAI Forensic Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .xai-box { background-color: #f8f9fa; border-left: 4px solid #343a40; padding: 10px 15px; margin-top: 10px; font-family: monospace; font-size: 0.9em;}
        .markdown-report { white-space: pre-wrap; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; line-height: 1.65; }
    </style>
</head>
<body class="report-body">

    <div class="report-paper">
        <div class="header">
            <div class="logo-small">AI-SPY <span class="accent" style="font-size: 12px;">XAI VERIFICATION</span></div>
            <div class="text-end text-muted small">
                Report ID: <span id="reportId">...</span><br>
                Date: <span id="reportDate">...</span>
            </div>
        </div>

        <h2 class="text-center mb-4">AI-SPY Executive Intelligence Brief</h2>
        
        <div class="verdict-box">
            <div id="verdictStamp" class="stamp">ANALYZING</div>
            <p class="mt-2 text-muted fw-bold">Confidence Score: <span id="confidenceScore">0</span>%</p>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="section-title">Final Intelligence Report</div>
                <div id="finalReport" class="xai-box markdown-report">Waiting for generated report...</div>
            </div>
        </div>

        <div class="mt-5 pt-4 text-center text-muted small border-top">
            <p>Generated securely by AI-SPY Threat Intelligence Engine.</p>
            <button class="btn btn-dark btn-sm no-print mt-2" onclick="window.print()">🖨️ Print Intelligence Brief</button>
            <a href="/" class="btn btn-outline-secondary btn-sm no-print mt-2">← Analyze Another</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/report.js') }}"></script>
</body>
</html>
